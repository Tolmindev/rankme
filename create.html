<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Create tier list - RankMe</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<link rel="icon" type="image/svg+xml" href="assets/brand/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#0e0c14; --panel:#1a1728; --line:rgba(255,255,255,0.08);
  --text:#f1eefb; --text-dim:#a79fc4;
  --accent-grad:linear-gradient(120deg,#b79bf0 0%,#e6a9e8 50%,#cdd6f7 100%);
  --radius:14px;
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{
  background: radial-gradient(circle at 18% 0%,rgba(160,120,220,.16),transparent 45%),
              radial-gradient(circle at 85% 15%,rgba(120,160,230,.1),transparent 40%), var(--bg-0);
  color:var(--text); font-family:Montserrat,system-ui,sans-serif; min-height:100vh;
}
header.site{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 40px; border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:50; background:rgba(14,12,20,.75); backdrop-filter:blur(14px);
}
.brand img{height:34px; display:block; transition:filter .35s}
.brand:hover img{filter:drop-shadow(0 0 10px rgba(200,150,255,.9)) brightness(1.15)}
nav.main{display:flex; align-items:center; gap:28px}
nav.main a{color:var(--text-dim); text-decoration:none; font-weight:700; font-size:.92rem}
nav.main a:hover,nav.main a.active{color:var(--text)}
nav.main a.exclusive{color:#e79ee0}



.wrap{max-width:560px; margin:48px auto; padding:0 20px 80px}
.card{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:28px 28px 24px;
}
h1{margin:0 0 8px; font-size:1.4rem; font-weight:900}
.sub{color:var(--text-dim); font-weight:600; font-size:.88rem; margin:0 0 24px; line-height:1.5}
label{display:block; font-size:.72rem; font-weight:800; letter-spacing:.4px; text-transform:uppercase; color:var(--text-dim); margin:0 0 8px}
input[type=text], textarea{
  width:100%; padding:12px 14px; border-radius:10px;
  border:1px solid rgba(200,160,240,.22);
  background:#14121f; color:var(--text); font-family:inherit; font-weight:600; font-size:.9rem;
  margin-bottom:18px; outline:none;
  transition:border-color .15s, box-shadow .15s;
}
input[type=text]:focus, textarea:focus{
  border-color:rgba(200,160,240,.65);
  box-shadow:0 0 0 3px rgba(180,140,240,.12);
}
input[type=text]::placeholder{color:#6e6688}
.cover-drop{
  border:1px dashed rgba(200,160,240,.35); border-radius:12px; padding:28px 16px;
  text-align:center; color:var(--text-dim); font-weight:600; font-size:.85rem;
  margin-bottom:18px; cursor:pointer; transition:border-color .15s, background .15s;
  background:rgba(255,255,255,0.02);
}
.cover-drop:hover{border-color:rgba(200,160,240,.7); background:rgba(180,120,255,0.06)}
.hint{font-size:.75rem; color:var(--text-dim); font-weight:600; margin:-8px 0 18px}
.row{display:flex; gap:12px; flex-wrap:wrap}
.btn{
  padding:12px 24px; border-radius:999px; font-weight:800; font-size:.88rem; cursor:pointer; border:none;
  transition:transform .15s, filter .15s, box-shadow .15s;
}
.btn.primary{background:var(--accent-grad); color:#1a1226}
.btn.primary:hover{filter:brightness(1.08); transform:translateY(-1px); box-shadow:0 8px 22px rgba(180,120,240,.35)}
.btn.ghost{background:transparent; border:1px solid var(--line); color:var(--text)}
.btn.ghost:hover{border-color:rgba(200,160,240,.5)}
.note{
  margin-top:20px; padding:14px 16px; border-radius:10px; font-size:.8rem; font-weight:600;
  background:rgba(180,120,255,0.08); border:1px solid rgba(200,160,240,0.2); color:var(--text-dim); line-height:1.5;
}
footer.site{text-align:center; padding:32px 20px 40px; border-top:1px solid var(--line); display:flex; flex-direction:column; align-items:center; gap:12px}
footer.site img.footer-logo{height:56px;display:block}
footer.site .fine{color:var(--text-dim);font-size:.75rem;font-weight:600}
@media(max-width:720px){header.site{padding:12px 14px} .brand img{height:26px} nav.main{gap:12px} nav.main a{font-size:.78rem}}
nav.main a.cta-nav{
  padding:8px 18px; border-radius:999px; font-size:.8rem; font-weight:800;
  background: linear-gradient(120deg,#b79bf0,#e6a9e8); color:#1a1226 !important;
  border:none; text-decoration:none;
  box-shadow: 0 4px 16px rgba(180,140,230,.35);
  transition: filter .15s, transform .15s;
}
nav.main a.cta-nav:hover{ filter:brightness(1.08); transform:translateY(-1px); color:#1a1226 !important; }
.login-btn{
  padding:8px 16px; border-radius:999px; font-size:.85rem; font-weight:800;
  background: transparent !important; color: var(--text-dim) !important;
  border:1px solid var(--line) !important; cursor:pointer;
  box-shadow: none !important;
  transition: color .15s, border-color .15s, background .15s;
}
.login-btn:hover{
  color: var(--text) !important; border-color: rgba(200,160,240,.45) !important;
  background: rgba(255,255,255,0.04) !important; filter: none !important;
}
</style>
</head>
<body>
<header class="site">
  <a class="brand" href="index.html"><img src="assets/brand/RankMe_logo.svg" alt="RankMe"></a>
  <nav class="main">
    <a href="index.html">Browse</a>
    <a href="create.html" class="cta-nav">Create</a>
    <button class="login-btn" id="loginBtn" type="button">Account</button>
  </nav>
</header>

<div class="wrap">
  <div class="card">
    <h1>New tier list</h1>
    <p class="sub">Build offline, export PNG anytime. No account needed.</p>

    <label>Title</label>
    <input type="text" id="title" placeholder="My tier list" maxlength="60">

    <label>Cover (optional)</label>
    <div class="cover-drop" id="coverDrop">Drop image or click · 1200×630</div>
    <input type="file" id="coverFile" accept="image/*" hidden>
    <p class="hint">For the gallery card later. Optional.</p>

    <div class="row">
      <button class="btn primary" id="startBlank">Start blank</button>
    </div>

    <div class="note">
      Custom lists stay in your browser. Only Exclusive rankings can be saved with Login.
    </div>
  </div>
</div>

<footer class="site">
  <img class="footer-logo" src="assets/brand/Footer_logo.svg" alt="RankMe">
  <span class="fine">Create tier lists. Share rankings. No signup required.</span>
</footer>
<script>
document.getElementById('coverDrop').onclick = () => document.getElementById('coverFile').click();
document.getElementById('coverFile').onchange = (e) => {
  const f = e.target.files?.[0];
  if(f) document.getElementById('coverDrop').textContent = f.name;
};
document.getElementById('startBlank').onclick = () => {
  const title = document.getElementById('title').value.trim() || 'My tier list';
  try { localStorage.setItem('rankme_draft_title', title); } catch(e){}
  // Generic builder next; for now go to exclusive SF tool as demo
  location.href = 'builder.html';
};
</script>
</body>
</html>
